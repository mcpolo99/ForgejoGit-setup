# This file is for reference only.
# The setup.sh script creates the ClusterIssuer automatically from your .env file.
#
# Manual install if needed:
#   1. Install cert-manager:
#      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
#   2. Create Azure DNS secret:
#      kubectl create secret generic azure-dns-secret \
#        --namespace cert-manager \
#        --from-literal=client-secret=YOUR_AZURE_CLIENT_SECRET
#
#   3. Apply this file (edit placeholders first):
#      kubectl apply -f cert-manager.yml

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          azureDNS:
            clientID: your-azure-client-id
            clientSecretSecretRef:
              name: azure-dns-secret
              key: client-secret
            subscriptionID: your-azure-subscription-id
            tenantID: your-azure-tenant-id
            resourceGroupName: your-resource-group
            hostedZoneName: yourdomain.com
