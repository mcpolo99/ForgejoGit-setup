apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-backup
  namespace: forgejo
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3
              env:
                - name: POSTGRES_HOST
                  value: postgres
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-secrets
                      key: POSTGRES_PASSWORD
                - name: BACKUP_KEEP_DAYS
                  value: "30"
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache postgresql17-client
                  /bin/sh /scripts/backup.sh
              volumeMounts:
                - name: forgejo-data
                  mountPath: /data/forgejo
                  readOnly: true
                - name: backups
                  mountPath: /backups
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: forgejo-data
              persistentVolumeClaim:
                claimName: forgejo-data
            - name: backups
              persistentVolumeClaim:
                claimName: forgejo-backups
            - name: scripts
              configMap:
                name: forgejo-scripts
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-backups
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
