apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:12
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: postgres:5432
            - name: FORGEJO__database__NAME
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: POSTGRES_DB
            - name: FORGEJO__database__USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: POSTGRES_USER
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: POSTGRES_PASSWORD
            - name: FORGEJO__server__DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: forgejo-config
                  key: HOSTNAME
            - name: FORGEJO__server__ROOT_URL
              valueFrom:
                configMapKeyRef:
                  name: forgejo-config
                  key: ROOT_URL
            - name: FORGEJO__server__SSH_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: forgejo-config
                  key: HOSTNAME
            - name: FORGEJO__server__SSH_PORT
              valueFrom:
                configMapKeyRef:
                  name: forgejo-config
                  key: SSH_PORT
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "false"
            - name: FORGEJO__service__REQUIRE_SIGNIN_VIEW
              value: "true"
            - name: FORGEJO__service__REGISTER_MANUAL_CONFIRM
              value: "true"
            - name: FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION
              value: "true"
            - name: FORGEJO__service__ENABLE_CAPTCHA
              value: "true"
            - name: FORGEJO__service__DEFAULT_USER_VISIBILITY
              value: private
            - name: FORGEJO__service__DEFAULT_ORG_VISIBILITY
              value: private
            - name: FORGEJO__repository__DEFAULT_PRIVATE
              value: "true"
            - name: FORGEJO__openid__ENABLE_OPENID_SIGNIN
              value: "false"
            - name: FORGEJO__openid__ENABLE_OPENID_SIGNUP
              value: "false"
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          volumeMounts:
            - name: forgejo-data
              mountPath: /data
      volumes:
        - name: forgejo-data
          persistentVolumeClaim:
            claimName: forgejo-data
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
spec:
  selector:
    app: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: ssh
      port: 22
      targetPort: 22
