# Placeholders replaced by setup.sh from .env
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          azureDNS:
            clientID: __AZURE_CLIENT_ID__
            clientSecretSecretRef:
              name: azure-dns-secret
              key: client-secret
            subscriptionID: __AZURE_SUBSCRIPTION_ID__
            tenantID: __AZURE_TENANT_ID__
            resourceGroupName: __AZURE_RESOURCE_GROUP__
            hostedZoneName: __AZURE_ZONE_NAME__
